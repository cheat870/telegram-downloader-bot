services:
  - type: worker
    name: telegram-downloader-bot
    runtime: python
    plan: starter
    region: singapore
    branch: main
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: python bot_download.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: LOG_CHANNEL_ID
        sync: false
      - key: ADMIN_USER_ID
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: telegram-downloader-db
          property: connectionString
      - key: MAX_VIDEO_HEIGHT
        value: "2160"
      - key: MAX_FILE_SIZE_MB
        value: "50"
      - key: MAX_ITEMS_PER_REQUEST
        value: "5"

databases:
  - name: telegram-downloader-db
    databaseName: telegram_downloader_bot
    user: telegram_downloader_bot
    plan: free
    postgresMajorVersion: "15"
